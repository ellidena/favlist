<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Wishlist</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="container">

<h1>Your Wishlist</h1>

<ul>
  <li th:each="entry : ${entries}"
      th:classappend="${param.edit != null and param.edit[0] == entry.itemId.toString()} ? 'editing' : ''">

    <a th:href="@{'/items/' + ${entry.itemId}}">
      <strong th:text="${entry.itemName}">Item Name</strong>
    </a>

    <!-- EDIT MODE -->
    <div th:if="${param.edit != null and param.edit[0] == entry.itemId.toString()}">
      <form action="/wishlist/update-note" method="post">
        <input type="hidden" name="itemId" th:value="${entry.itemId}">
        <input type="text" name="note" th:value="${entry.note}">
        <button type="submit">Save</button>
      </form>

      <a href="/wishlist">Cancel</a>
    </div>

    <!-- VIEW MODE -->
    <div th:if="${param.edit == null or param.edit[0] != entry.itemId.toString()}">
      <span><strong>Note:</strong> <span th:text="${entry.note}"></span></span>
      <a th:href="@{'/wishlist'(edit=${entry.itemId})}">Edit</a>

      <form action="/wishlist/remove" method="post" style="display:inline;">
        <input type="hidden" name="itemId" th:value="${entry.itemId}">
        <input type="hidden" name="redirect" th:value="@{/wishlist}">
        <button type="submit">Remove</button>
      </form>
    </div>

  </li>

  </li>
</ul>

<a href="/items">Back to items</a>
</div>
</body>
</html>
