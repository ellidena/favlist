<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Wishlist</title>
</head>
<body>

<h1>Your Wishlist</h1>

<ul>
  <li th:each="entry : ${entries}">
    <strong th:text="${entry.itemName}">Item Name</strong>
    (ID: <span th:text="${entry.itemId}"></span>)

    Note: <span th:text="${entry.note}"></span>

    <form action="/wishlist/remove" method="post">
      <input type="hidden" name="itemId" th:value="${entry.itemId}">
      <button type="submit">Remove</button>
    </form>

  </li>
</ul>

<a href="/items">Back to items</a>

</body>
</html>
