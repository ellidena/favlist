<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Wishlist</title>
</head>
<body>

<h1>Your Wishlist</h1>

<ul>
  <li th:each="entry : ${entries}">
    Item ID: <span th:text="${entry.itemId}"></span>
    Note: <span th:text="${entry.note}"></span>
  </li>
</ul>

<a href="/items">Back to items</a>

</body>
</html>
