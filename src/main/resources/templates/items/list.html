<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Items</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<form method="get" action="/items" class="category-filter">
    <label for="category">Filter by category:</label>
    <select name="category" id="category" onchange="this.form.submit()">

        <!-- Option: All categories -->
        <option value=""
                th:selected="${selectedCategory == null}">
            All categories
        </option>

        <!-- Options: Each category -->
        <option th:each="cat : ${categories}"
                th:value="${cat.categoryId}"
                th:text="${cat.name}"
                th:selected="${selectedCategory == cat.categoryId}">
        </option>

    </select>
</form>


<h1>All Items</h1>

<ul>
    <!-- each <li> item wrapped with a conditional css class -->
    <li th:each="item : ${items}"
        th:classappend="${wishlistItemIds.contains(item.itemId)} ? 'in-wishlist' : ''">

        <a th:href="@{'/items/' + ${item.itemId}}"
           th:text="${item.name}">Item name</a>

        <!-- If NOT in wishlist: show Add button -->
        <form th:if="${!wishlistItemIds.contains(item.itemId)}"
              action="/wishlist/add" method="post" style="display:inline;">
            <input type="hidden" name="itemId" th:value="${item.itemId}">
            <input type="hidden" name="note" value="">
            <input type="hidden" name="redirect"
                   th:value="'/items' + (${selectedCategory} != null ? ('?category=' + ${selectedCategory}) : '')">
            <button type="submit">Quick Add</button>
        </form>

        <!-- If already in wishlist: show Remove button -->
        <form th:if="${wishlistItemIds.contains(item.itemId)}"
              action="/wishlist/remove" method="post" style="display:inline;">
            <input type="hidden" name="itemId" th:value="${item.itemId}">
            <input type="hidden" name="redirect"
                   th:value="'/items' + (${selectedCategory} != null ? ('?category=' + ${selectedCategory}) : '')">
            <button type="submit">Remove</button>
        </form>



    </li>
</ul>

<h2>Categories</h2>
<ul>
    <li th:each="category : ${categories}"
        th:text="${category.name}">Category</li>
</ul>

</body>
</html>
