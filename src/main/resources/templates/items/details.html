<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Item Details</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="container">

<h1 th:text="${item.name}">Item Name</h1>

<p><strong>Description:</strong>
  <span th:text="${item.description}">Description here</span>
</p>

<!-- If NOT in wishlist: show Add form -->
<div th:if="${!wishlistItemIds.contains(item.itemId)}">
  <form action="/wishlist/add" method="post">
    <input type="hidden" name="itemId" th:value="${item.itemId}">
    <input type="text" name="note" placeholder="Note">
    <button type="submit">Add to wishlist</button>
  </form>
</div>

<!-- If already in wishlist: show Edit + Remove -->
<div th:if="${wishlistItemIds.contains(item.itemId)}">

  <p><strong>Your note:</strong>
    <span th:text="${entryNote}">No note</span>
  </p>

  <form action="/wishlist/update-note" method="post">
    <input type="hidden" name="itemId" th:value="${item.itemId}">
    <input type="hidden" name="redirect" th:value="@{'/items/' + ${item.itemId}}">
    <input type="text" name="note" th:value="${entryNote}">
    <button type="submit">Save note</button>
  </form>

  <form action="/wishlist/remove" method="post">
    <input type="hidden" name="itemId" th:value="${item.itemId}">
    <input type="hidden" name="redirect" value="/items">
    <button type="submit">Remove from wishlist</button>
  </form>
</div>


<p><strong>Category ID:</strong>
  <span th:text="${item.categoryId}">1</span>
</p>

<a href="/items">Back to items</a>
</div>
</body>
</html>
